                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
