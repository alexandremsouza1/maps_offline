apiVersion: v1
kind: ConfigMap
metadata:
  name: osrm-config
  namespace: osrm
data:
  MAP_BASE: "brazil-latest"
  PROFILE: "car"
  ALGORITHM: "mld"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: osrm
data:
  KONG_DATABASE: "postgres"
  KONG_PG_HOST: "postgres-kong-svc"
  KONG_PG_PORT: "5432"
  KONG_PROXY_ACCESS_LOG: "/dev/stdout"
  KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
  KONG_PROXY_ERROR_LOG: "/dev/stderr"
  KONG_ADMIN_ERROR_LOG: "/dev/stderr"
  KONG_ADMIN_LISTEN: "0.0.0.0:8001"
  KONG_PROXY_LISTEN: "0.0.0.0:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: osrm
data:
  KC_DB: "postgres"
  KC_DB_URL: "jdbc:postgresql://postgres-keycloak-svc:5432/keycloak"
  KC_HOSTNAME_STRICT: "false"
  KC_HTTP_ENABLED: "true"
  KC_PROXY: "edge"
