# ─────────────────────────────────────────
# PersistentVolumeClaims
# storageClassName não definido → usa o default do cluster automaticamente
# (funciona em Docker Desktop, Rancher Desktop, K3s, GKE, EKS, etc.)
# ─────────────────────────────────────────

# Volume para dados do OSRM
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: osrm-data-pvc
  namespace: osrm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Volume para PostgreSQL do Keycloak
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-keycloak-pvc
  namespace: osrm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# Volume para PostgreSQL do Kong
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-kong-pvc
  namespace: osrm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi