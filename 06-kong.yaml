# ─────────────────────────────────────────
# Job de migração do banco do Kong
# Roda uma vez antes do Kong subir
# ─────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-migrations
  namespace: osrm
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-kong-svc 5432; do
                echo "Aguardando PostgreSQL..."
                sleep 3
              done
      containers:
        - name: kong-migrations
          image: kong:3.5
          command: ["kong", "migrations", "bootstrap"]
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "postgres-kong-svc"
            - name: KONG_PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_DATABASE
            - name: KONG_PG_USER
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_USER
            - name: KONG_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# ─────────────────────────────────────────
# Kong API Gateway
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: osrm
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-kong-svc 5432; do
                echo "Aguardando PostgreSQL..."
                sleep 3
              done
      containers:
        - name: kong
          image: kong:3.5
          env:
            - name: KONG_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_DATABASE
            - name: KONG_PG_HOST
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PG_HOST
            - name: KONG_PG_PORT
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PG_PORT
            - name: KONG_PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_DATABASE
            - name: KONG_PG_USER
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_USER
            - name: KONG_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kong-secret
                  key: KONG_PG_PASSWORD
            - name: KONG_PROXY_ACCESS_LOG
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PROXY_ACCESS_LOG
            - name: KONG_ADMIN_ACCESS_LOG
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_ADMIN_ACCESS_LOG
            - name: KONG_PROXY_ERROR_LOG
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PROXY_ERROR_LOG
            - name: KONG_ADMIN_ERROR_LOG
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_ADMIN_ERROR_LOG
            - name: KONG_ADMIN_LISTEN
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_ADMIN_LISTEN
            - name: KONG_PROXY_LISTEN
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PROXY_LISTEN
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy-svc
  namespace: osrm
spec:
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: kong-admin-svc
  namespace: osrm
spec:
  selector:
    app: kong
  ports:
    - name: admin
      port: 8001
      targetPort: 8001
  type: ClusterIP   # Admin NUNCA exposto publicamente
